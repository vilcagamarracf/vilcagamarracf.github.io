baseURL = "https://vilcagamarracf.github.io/"
defaultContentLanguage = 'es'
languageCode = "es-pe"
title = "Cesar Vilca"
theme = "PaperMod"
math = true

[markup.goldmark.extensions.passthrough]
  enable = true

[markup.goldmark.extensions.passthrough.delimiters]
  block = [["$$", "$$"]]
  inline = [["$", "$"]]
  
[markup.goldmark.renderer]
  unsafe = true
  
[params]
  description = "Agricultura de Precisión, Teledetección y Programación"


  author = "Cesar Vilca"
  ShowReadingTime = true
  ShowShareButtons = false
  ShowCodeCopyButtons = true
  customCSS = ["css/extended/custom.css"]

  [params.profileMode]
    enabled = true
    title = "Cesar Vilca"
    subtitle = "Agricultura de Precisión · Teledetección · Estadística · Programación"
    imageUrl = "/img/foto_perfil_vf.jpg"

    [[params.profileMode.buttons]]
      name = "Blog"
      url = "/posts/"

[[params.socialIcons]]
  name = "github"
  url = "https://github.com/vilcagamarracf"

[[params.socialIcons]]
  name = "x"
  url = "https://twitter.com/vilcagamarracf"

